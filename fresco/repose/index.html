<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repose</title>
<style>
  /* The repose composition as a live wallpaper: zephyr-language monolith —
     plaque odometer clock, Zephyr strings, agent dots, media footer — all
     colored by Livery roles pushed as WE properties. Design record:
     repose/HANDOFF.md (book test, no chrome, one axis). */
  :root {
    --surface: #1b1b1b;
    --background: #101014;
    --text: #f5e0dc;
    --muted: #8f8a94;
    --primary: #89b4fa;
    --attention: #fab387;
    --success: #9ed072;
    --viz1: #87d6bc;
    --viz2: #a8cbe2;
  }
  /* the pixel look's face (user verdict from the 13-font trial, 2026-07-17):
     Instrument Serif, SIL OFL — font/LICENSE.md. The weight range maps every
     weight to the single file so nothing gets faux-bolded. */
  @font-face {
    font-family: "Instrument Serif";
    src: url("font/InstrumentSerif-Regular.ttf") format("truetype");
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }
  body {
    background: radial-gradient(ellipse at 50% 35%,
      color-mix(in srgb, var(--surface) 88%, var(--primary)) 0%,
      var(--background) 75%);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
  }
  body[data-backdrop="clear"] { background: transparent; }

  /* grade, don't blur (design record): vignette pushes luminance toward the
     composition; sits above the backdrop, below the content */
  #scrim { position: fixed; inset: 0; pointer-events: none; opacity: 0;
           transition: opacity .4s;
           background: radial-gradient(ellipse at center,
             transparent 42%, rgba(0,0,0,.45) 100%); }
  body[data-grade="on"] #scrim { opacity: 1; }
  /* StandBy-style night tint: one hue over the whole composition */
  body[data-night="on"] { filter: sepia(1) hue-rotate(-40deg) saturate(2.2)
                                  brightness(.6) contrast(1.05); }

  /* dim-then-fade entrance (survey): black dims away first, then the
     composition settles in behind it — pure keyframes, no JS dependency */
  #entrance { position: fixed; inset: 0; z-index: 10; background: #000;
              pointer-events: none; opacity: 0;
              animation: entrance-dim .45s ease .1s both; }
  @keyframes entrance-dim { from { opacity: 1; } to { opacity: 0; } }
  .monolith { animation: entrance-rise .8s ease .35s backwards; }
  @keyframes entrance-rise { from { opacity: 0; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    #entrance { display: none; }
    .monolith { animation: none; }
  }

  .monolith {
    position: fixed; left: 50%; top: 20vh; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2.2vh;
    transition: top .6s cubic-bezier(0.23, 1, 0.32, 1);
  }
  #date { font-size: calc(1.15vw * var(--typescale, 1)); letter-spacing: .08em;
          color: var(--muted); }

  /* loud variant: the visualizer is the star — clock retreats to the
     top-right (bar-clock muscle memory), media steps forward */
  body[data-variant="loud"] .monolith {
    left: auto; right: 4vw; top: 6vh; transform: none; align-items: flex-end;
  }
  body[data-variant="loud"] #clock { font-size: calc(3.4vw * var(--typescale, 1)); }
  body[data-variant="loud"] #date { font-size: calc(.85vw * var(--typescale, 1)); }
  body[data-variant="loud"] #visualizer {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 78vw; height: 42vh;
  }
  body[data-variant="loud"] #media {
    position: fixed; left: 50%; bottom: 8vh; transform: translateX(-50%);
    font-size: calc(1.5vw * var(--typescale, 1));
  }
  #devhint {
    position: fixed; left: 14px; bottom: 10px; display: none;
    font-size: 11px; color: var(--muted); opacity: .7;
  }
  /* in-cover selection hint: shown once on cover entry, then fades */
  #coverhint {
    position: fixed; left: 2.2vw; bottom: 2vh; font-size: .72vw;
    color: var(--muted); letter-spacing: .06em; opacity: 0;
    transition: opacity .6s; pointer-events: none;
    text-shadow: 1px 1px 0 rgba(0, 0, 0, .4);
  }
  body[data-look="pixel"] #coverhint { letter-spacing: .12em; }
  /* scene-name label (bottom right; reposelabel on|off, in-cover `l`) */
  #scenelabel {
    position: fixed; right: 2.2vw; bottom: 2vh; font-size: .72vw;
    color: var(--muted); letter-spacing: .06em; opacity: 0;
    transition: opacity .6s; pointer-events: none;
    text-shadow: 1px 1px 0 rgba(0, 0, 0, .4);
  }
  body[data-scenelabel="on"] #scenelabel { opacity: .85; }
  body[data-look="pixel"] #scenelabel { letter-spacing: .12em; }

  /* plaque odometer clock: hours in primary, minutes ÷1.5, seconds ÷2;
     digits knocked out toward the surface; columns roll 500ms OutQuint */
  #clock { display: flex; align-items: flex-start; gap: .07em;
           font-size: calc(7.2vw * var(--typescale, 1)); font-weight: 700; }
  .zcol { overflow: hidden; height: 1.16em; width: .82em; border-radius: .045em; }
  .zcol .stack { display: flex; flex-direction: column;
                 transition: transform .5s cubic-bezier(0.23, 1, 0.32, 1); }
  .zcol .cell { height: 1.16em; line-height: 1.16; display: flex; align-items: center;
                justify-content: center; opacity: .55; transition: opacity .3s;
                color: var(--background); }
  .zcol .cell.on { opacity: 1; }
  .zcol .cell.zero { background: transparent !important; }
  .zsep { width: .09em; height: 1.16em; margin: 0 .05em; border-radius: .03em;
          background: color-mix(in srgb, var(--surface) 60%, transparent); }

  #agents { display: flex; align-items: center; gap: .55em; min-height: 16px; }
  #agents .dot { width: 7px; height: 7px; border-radius: 50%; }
  #agents .dot.working { background: var(--muted); }
  #agents .dot.waiting { background: var(--attention); box-shadow: 0 0 9px var(--attention); }
  #agents .dot.done    { background: var(--success); box-shadow: 0 0 9px var(--success); }
  #agentline { font-size: calc(.78vw * var(--typescale, 1)); color: var(--muted);
               letter-spacing: .05em; }

  /* strings live in the monolith at the accepted 260x80 proportions —
     a compact element under the clock, not a screen-wide band */
  #visualizer { display: block; width: 34vw; height: 10.5vw; }
  body[data-viz="spectrum"] #visualizer { height: 9vw; }
  #media { display: none; font-size: calc(.95vw * var(--typescale, 1));
           color: var(--muted); letter-spacing: .04em;
           max-width: 34vw; white-space: nowrap; overflow: hidden; }
  body[data-variant="loud"] #media { max-width: 70vw; }
  #media .t { color: var(--text); }
  /* long titles truncate and scroll: hold, drift to the far end, hold,
     drift back (alternate) — distance and pace set per-track in JS */
  #media .inner { display: inline-block; white-space: nowrap; }
  #media.scroll .inner {
    animation: marquee var(--marqueedur, 12s) linear infinite alternate;
  }
  @keyframes marquee {
    0%, 12% { transform: translateX(0); }
    88%, 100% { transform: translateX(var(--marqueeshift, 0px)); }
  }

  /* dev-harness wallpaper trial layer (production backdrop is a real
     wallpaper view beneath the composition inside the cover) */
  #wall { position: fixed; inset: 0; z-index: -1; display: none;
          background-size: cover; background-position: center; }
  body[data-wall="on"] { background: transparent; }
  body[data-wall="on"] #wall { display: block; }
  /* grade, don't blur (hyprlock recipe) applied to the trial wall */
  body[data-grade="on"] #wall { filter: contrast(.89) brightness(.82) saturate(.75); }

  /* ---- pixel look (qylock's pixel themes, replicated as a whole language:
     corner-anchored flat pixel type over the scene — the wallpaper is the
     star. Hours in text, minutes in primary split by an attention bar,
     tiny wide-tracked uppercase labels, hard offset shadows, no plaques.
     Never blended with zephyr; switched wholesale via reposelook. ---- */
  body[data-look="pixel"] {
    font-family: "Instrument Serif", Georgia, serif;
  }
  body[data-look="pixel"] .monolith {
    left: 4vw; top: 6vh; transform: none; align-items: flex-start;
    gap: 1.6vh;
  }
  body[data-look="pixel"] #clock {
    font-size: calc(6.4vw * var(--typescale, 1));
    text-shadow: .035em .035em 0 rgba(0, 0, 0, .55);
    gap: .02em;
    /* digits center inside their columns; pull the clock left so its ink
       edge lines up with the tracked lines below */
    margin-left: -.05em;
  }
  /* column metric tuned for Instrument Serif digits (zephyr's .82em is
     SF Mono's) */
  body[data-look="pixel"] .zcol { width: .5em; }
  /* flat digits: kill the plaque cells, color per column group */
  body[data-look="pixel"] .zcol .cell {
    background: transparent !important; opacity: 1;
  }
  body[data-look="pixel"] .zcol.h .cell { color: var(--text) !important; }
  body[data-look="pixel"] .zcol.m .cell { color: var(--primary) !important; }
  body[data-look="pixel"] .zcol .cell:not(.on) { opacity: 0; }
  body[data-look="pixel"] .zsep {
    background: var(--attention); width: .07em; height: .88em;
    margin: 0 .1em; align-self: center; border-radius: 0;
  }
  /* small seconds counter riding the HH | MM baseline, muted */
  body[data-look="pixel"] .zsep.sec { display: none; }
  body[data-look="pixel"] .zcol.sec {
    font-size: .42em; align-self: flex-end; margin-bottom: .14em;
  }
  body[data-look="pixel"] .zcol.sec:nth-last-of-type(2) { margin-left: .7em; }
  body[data-look="pixel"] .zcol.sec .cell { color: var(--muted) !important; }
  /* qylock order: clock first, date beneath it */
  body[data-look="pixel"] #clock { order: -1; }
  body[data-look="pixel"] #date {
    letter-spacing: .12em;
    font-size: calc(1.05vw * var(--typescale, 1)); color: var(--text);
    opacity: .95; text-shadow: 1px 1px 0 rgba(0, 0, 0, .55);
  }
  body[data-look="pixel"] #date::before { content: "— "; color: var(--attention); }
  body[data-look="pixel"] #agents .dot { border-radius: 0; box-shadow: none;
    width: 8px; height: 8px; }
  body[data-look="pixel"] #agentline, body[data-look="pixel"] #media {
    letter-spacing: .12em;
    text-shadow: 1px 1px 0 rgba(0, 0, 0, .55);
  }
  /* strings go chunky: low-res backing store upscaled crisp (set in JS);
     the pixels axis (x key) switches back to smooth rendering */
  body[data-look="pixel"] #visualizer { image-rendering: pixelated; width: 26vw;
    height: 8vw; }
  body[data-pixels="off"] #visualizer { image-rendering: auto; }
  body[data-look="pixel"][data-variant="loud"] .monolith { right: auto; }
  body[data-look="pixel"][data-variant="loud"] #clock {
    font-size: calc(3.2vw * var(--typescale, 1));
  }
  body[data-look="pixel"][data-variant="loud"] #visualizer {
    width: 78vw; height: 42vh;
  }
</style>
</head>
<body data-grade="on">
  <div id="wall"></div>
  <div id="entrance"></div>
  <div id="scrim"></div>
  <div class="monolith">
    <div id="date"></div>
    <div id="clock"></div>
    <div id="agents"></div>
    <div id="agentline"></div>
    <canvas id="visualizer" aria-label="Audio visualizer"></canvas>
    <div id="media"></div>
  </div>
  <div id="coverhint">←→ scene · tab look · b visualizer · x pixels · v variant · g grade · n night · l label · esc exits</div>
  <div id="scenelabel"></div>
  <div id="devhint"></div>

<script>
  // entrance safety: whatever happens to the animation, the black overlay
  // must never strand the cover — remove it outright once it's done
  setTimeout(() => document.getElementById("entrance").remove(), 1600);

  // ---------- theme (Livery roles arrive as WE user properties) ----------
  const root = document.documentElement.style;
  const parseColor = (p) => {
    if (!p || !p.value || typeof p.value !== "string") return null;
    const parts = p.value.split(" ").map(Number);
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return parts;
  };
  const css = (rgb) => `rgb(${rgb.map(v => Math.round(v * 255)).join(",")})`;
  const scale = (rgb, f) => rgb.map(v => Math.min(1, v * f));

  let primary = [0.54, 0.71, 0.98];
  let surface = [0.10, 0.10, 0.12];
  let viz = [[0.53, 0.84, 0.74], [0.66, 0.80, 0.89]];
  let agents = { working: 0, waiting: 0, done: 0 };
  let variant = "quiet";
  let look = "zephyr";
  let vizMode = "strings";
  let lastLoudAudio = Date.now();

  function setVariant(next) {
    if (next !== "quiet" && next !== "loud") return;
    variant = next;
    document.body.dataset.variant = variant;
    resize();
    // the media budget changes between variants — re-measure the marquee
    if (lastMedia) setMediaText(lastMedia[0], lastMedia[1]);
  }

  function setLook(next) {
    if (next !== "zephyr" && next !== "pixel") return;
    look = next;
    document.body.dataset.look = look;
    resize();   // the pixel look changes the canvas backing resolution
  }

  function setViz(next) {
    if (next !== "strings" && next !== "spectrum") return;
    vizMode = next;
    document.body.dataset.viz = vizMode;
    resize();
  }

  let pixels = true;
  function setPixels(next) {
    pixels = next !== "off" && next !== false;
    document.body.dataset.pixels = pixels ? "on" : "off";
    resize();   // pixelization changes the canvas backing resolution
  }

  // media line: truncate-and-scroll for long title/artist combos
  let lastMedia = null;
  function setMediaText(title, artist) {
    lastMedia = [title, artist];
    const el = document.getElementById("media");
    el.innerHTML = `<span class="inner">♪ <span class="t"></span> — <span class="a"></span></span>`;
    el.querySelector(".t").textContent = title;
    el.querySelector(".a").textContent = artist;
    requestAnimationFrame(() => {
      const inner = el.querySelector(".inner");
      const overflow = inner.scrollWidth - el.clientWidth;
      el.classList.toggle("scroll", overflow > 2);
      if (overflow > 2) {
        el.style.setProperty("--marqueeshift", `-${overflow}px`);
        el.style.setProperty("--marqueedur", `${Math.max(8, overflow / 30 + 6).toFixed(1)}s`);
      }
    });
  }

  let coverHintShown = false;
  function showCoverHint() {
    if (coverHintShown) return;   // once per entry (each entry is a fresh page)
    coverHintShown = true;
    const el = document.getElementById("coverhint");
    el.style.opacity = 1;
    setTimeout(() => { el.style.opacity = 0; }, 3200);
  }

  window.wallpaperPropertyListener = {
    applyUserProperties(p) {
      const set = (name, value) => value && root.setProperty(name, css(value));
      const primaryColor = parseColor(p.liveryprimary) || parseColor(p.schemecolor);
      if (primaryColor) { primary = primaryColor; set("--primary", primaryColor); }
      const surfaceColor = parseColor(p.liverysurface);
      if (surfaceColor) { surface = surfaceColor; set("--surface", surfaceColor); }
      set("--background", parseColor(p.liverybackground));
      set("--text", parseColor(p.liverytext));
      set("--muted", parseColor(p.liverytextmuted));
      set("--attention", parseColor(p.liveryattention));
      set("--success", parseColor(p.liverysuccess));
      const v1 = parseColor(p.liveryviz1), v2 = parseColor(p.liveryviz2);
      if (v1) { viz[0] = v1; set("--viz1", v1); }
      if (v2) { viz[1] = v2; set("--viz2", v2); }
      if (primaryColor || surfaceColor) buildClock();
      if (p.reposevariant && p.reposevariant.value) setVariant(String(p.reposevariant.value));
      if (p.reposelook && p.reposelook.value) setLook(String(p.reposelook.value));
      if (p.reposeviz && p.reposeviz.value) setViz(String(p.reposeviz.value));
      if (p.reposepixels && p.reposepixels.value) setPixels(String(p.reposepixels.value));
      if (p.reposecover && String(p.reposecover.value) === "on") showCoverHint();
      if (p.reposebackdrop && p.reposebackdrop.value) {
        document.body.dataset.backdrop =
          String(p.reposebackdrop.value) === "clear" ? "clear" : "opaque";
      }
      if (p.reposegrade && p.reposegrade.value !== undefined) {
        document.body.dataset.grade =
          String(p.reposegrade.value) === "off" ? "off" : "on";
      }
      if (p.reposenight && p.reposenight.value !== undefined) {
        document.body.dataset.night =
          String(p.reposenight.value) === "on" ? "on" : "off";
      }
      if (p.reposescene && p.reposescene.value !== undefined) {
        document.getElementById("scenelabel").textContent = String(p.reposescene.value);
      }
      if (p.reposelabel && p.reposelabel.value !== undefined) {
        document.body.dataset.scenelabel =
          String(p.reposelabel.value) === "off" ? "off" : "on";
      }

      let agentsChanged = false;
      for (const key of ["working", "waiting", "done"]) {
        const prop = p["agent" + key];
        if (prop && prop.value !== undefined) {
          agents[key] = Number(prop.value) || 0;
          agentsChanged = true;
        }
      }
      if (agentsChanged) renderAgents();
    }
  };

  // ---------- plaque odometer clock ----------
  const clockEl = document.getElementById("clock");
  function buildClock() {
    const bases = [primary, scale(primary, 1 / 1.5), scale(primary, 1 / 2)];
    const column = (base, kind) => `<span class="zcol ${kind}"><span class="stack">${
      Array.from({ length: 10 }, (_, i) => i === 0
        ? `<span class="cell zero" style="color:${css(base)}">0</span>`
        : `<span class="cell" style="background:${css(scale(base, 1 + i / 10))}">${i}</span>`
      ).join("")}</span></span>`;
    clockEl.innerHTML =
      column(bases[0], "h") + column(bases[0], "h") + `<span class="zsep"></span>` +
      column(bases[1], "m") + column(bases[1], "m") + `<span class="zsep sec"></span>` +
      column(bases[2], "sec") + column(bases[2], "sec");
  }
  buildClock();

  const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const pad2 = (n) => String(n).padStart(2, "0");
  const digitsOf = (d) => {
    const out = [];
    for (const value of [d.getHours(), d.getMinutes(), d.getSeconds()]) {
      out.push(Math.floor(value / 10), value % 10);
    }
    return out;
  };
  // smoothstep minute pre-roll (survey: qylock clockwork/tape): columns that
  // change at the boundary ease into position over the last 200ms of second
  // 59, arriving exactly on it. cubic-bezier(1/3, 0, 2/3, 1) is exactly
  // p*p*(3-2p) — the transform loop below must not touch a column mid-roll.
  const prerolled = new Set();
  function tick() {
    const now = new Date();
    const digits = digitsOf(now);
    const stacks = clockEl.querySelectorAll(".zcol .stack");
    const ms = now.getMilliseconds();
    if (now.getSeconds() === 59 && ms >= 800 && prerolled.size === 0) {
      const next = digitsOf(new Date(now.getTime() + (1000 - ms)));
      for (let i = 0; i < 4; i++) {          // hour + minute columns only
        if (next[i] === digits[i]) continue;
        prerolled.add(i);
        stacks[i].style.transition =
          `transform ${1000 - ms}ms cubic-bezier(0.333, 0, 0.667, 1)`;
        stacks[i].style.transform = `translateY(${(-next[i] * 1.16).toFixed(2)}em)`;
      }
    } else if (now.getSeconds() !== 59 && prerolled.size) {
      prerolled.forEach(i => { stacks[i].style.transition = ""; });
      prerolled.clear();
    }
    stacks.forEach((stack, i) => {
      if (!prerolled.has(i)) {
        stack.style.transform = `translateY(${(-digits[i] * 1.16).toFixed(2)}em)`;
      }
      stack.querySelectorAll(".cell").forEach((cell, d) =>
        cell.classList.toggle("on", d === digits[i]));
    });
    document.getElementById("date").textContent =
      `${DAYS[now.getDay()]} ${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
  }
  setInterval(tick, 100);
  tick();

  // ---------- agent dots (hook-truth via runtime properties) ----------
  function renderAgents() {
    const dots = [];
    for (let i = 0; i < agents.working; i++) dots.push("working");
    for (let i = 0; i < agents.waiting; i++) dots.push("waiting");
    for (let i = 0; i < agents.done; i++) dots.push("done");
    document.getElementById("agents").innerHTML =
      dots.slice(0, 12).map(k => `<span class="dot ${k}"></span>`).join("");
    const parts = [];
    if (agents.working) parts.push(`${agents.working} working`);
    if (agents.waiting) parts.push(`${agents.waiting} waiting for you`);
    if (agents.done) parts.push(`${agents.done} done`);
    document.getElementById("agentline").textContent = parts.join(" · ");
  }

  // ---------- media footer ----------
  if (window.wallpaperRegisterMediaPropertiesListener) {
    window.wallpaperRegisterMediaPropertiesListener((p) => {
      const el = document.getElementById("media");
      el.style.display = "block";
      setMediaText(p.title || "", p.artist || "");
    });
    window.wallpaperRegisterMediaStatusListener((s) => {
      if (!s.enabled) document.getElementById("media").style.display = "none";
    });
  }

  // ---------- shared audio model + renderers ----------
  // Strings preserve the accepted math from ZephyrStringsPreview.swift,
  // frozen in the zephyr-strings baseline (pre-graduation history). Spectrum consumes the same
  // magnitude/envelope contract at a finer frequency resolution; renderers
  // own geometry only, never audio smoothing.
  const canvas = document.getElementById("visualizer");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  let width, height;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    width = rect.width;
    height = rect.height;
    // Pixel language uses a deliberately coarse backing store. The pixels
    // axis switches both renderers back to smooth retina rendering.
    const factor = look === "pixel" && pixels ? 0.4 : dpr;
    canvas.width = Math.max(1, Math.round(rect.width * factor));
    canvas.height = Math.max(1, Math.round(rect.height * factor));
    ctx.setTransform(factor, 0, 0, factor, 0, 0);
    wake();
  }
  window.addEventListener("resize", resize);
  new ResizeObserver(resize).observe(canvas);

  const makeBandModel = (count) => ({
    count,
    target: new Array(count).fill(0),
    displayed: new Array(count).fill(0),
    rolling: new Array(count).fill(0.15),
  });
  const audioModels = {
    strings: makeBandModel(10),
    spectrum: makeBandModel(24),
  };
  let animating = false;
  let quietFrames = 0;
  let lastAudioAt = -Infinity;
  let lastFrameAt = 0;
  let lastDrawAt = 0;
  let chain = 0;

  function wake() {
    const stranded = animating && performance.now() - lastDrawAt > 2000;
    if (!animating || stranded) {
      animating = true;
      lastFrameAt = 0;
      const token = ++chain;
      requestAnimationFrame((t) => draw(t, token));
    }
  }

  function groupFrame(frame, model, gain) {
    let energy = 0;
    for (let band = 0; band < model.count; band++) {
      const start = Math.floor(band * 64 / model.count);
      const end = Math.floor((band + 1) * 64 / model.count);
      let sum = 0;
      for (let i = start; i < end; i++) {
        const left = frame[i] || 0;
        const right = frame[i + 64] !== undefined ? frame[i + 64] : left;
        sum += (left + right) / 2;
      }
      model.target[band] = Math.min(1, sum / Math.max(1, end - start) * gain);
      energy += model.target[band];
    }
    return energy;
  }

  function ingestAudio(frame) {
    const gain = variant === "loud" ? 1.35 : 1;
    const frameEnergy = groupFrame(frame, audioModels.strings, gain);
    groupFrame(frame, audioModels.spectrum, gain);
    lastAudioAt = performance.now();
    if (frameEnergy > 0.1) lastLoudAudio = Date.now();
    wake();
  }

  if (window.wallpaperRegisterAudioListener) {
    window.wallpaperRegisterAudioListener(ingestAudio);
  }

  // loud is a music surface: after three silent minutes, settle to quiet
  setInterval(() => {
    if (variant === "loud" && Date.now() - lastLoudAudio > 180000) {
      setVariant("quiet");
    }
  }, 10000);

  function advanceModel(model, dt, fresh) {
    const active = Math.max(...model.target) > 0.02;
    // The 10-band strings model remains byte-for-byte equivalent in behavior:
    // 750ms/5s rolling level, median-relative normalization, 12ms/45ms
    // attack/release. Generalizing the loop only admits a different band count.
    if (fresh && active) {
      for (let band = 0; band < model.count; band++) {
        const trackingTime = model.target[band] > model.rolling[band] ? 0.75 : 5.0;
        model.rolling[band] += (model.target[band] - model.rolling[band]) *
          (1 - Math.exp(-dt / trackingTime));
      }
    }
    const sorted = [...model.rolling].sort((a, b) => a - b);
    const middle = Math.floor(sorted.length / 2);
    const median = sorted.length % 2
      ? sorted[middle]
      : (sorted[middle - 1] + sorted[middle]) / 2;

    let energy = 0;
    for (let band = 0; band < model.count; band++) {
      const relative = median / Math.max(0.04, model.rolling[band]);
      const normalization = Math.min(1.4, Math.max(0.85, Math.pow(relative, 0.55)));
      const goal = Math.min(1, model.target[band] * normalization);
      const timeConstant = goal > model.displayed[band] ? 0.012 : 0.045;
      model.displayed[band] += (goal - model.displayed[band]) *
        (1 - Math.exp(-dt / timeConstant));
      energy += model.displayed[band];
    }
    return energy;
  }

  function drawStrings(levels) {
    const scale = height / 80;
    const curveWidth = width / 1.3;
    const curveHeight = height / 2;
    const segmentWidth = curveWidth / levels.length;
    const spillInset = (width - curveWidth) / 2;
    const yc = height / 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (let s = 0; s < levels.length; s++) {
      const pulse = Math.max(levels[s], 0.012);
      const direction = (s < 3 || s > 7) ? -1 : 1;
      const lateral = s > 5 ? 1 : -1;
      const c1x = spillInset + ((s - 1) + lateral * pulse * 1.5) * segmentWidth;
      const c1y = yc + direction * curveHeight * pulse * 1.85;
      const mix = s / levels.length;
      const color = viz[0].map((v, i) => v + (viz[1][i] - v) * mix);
      const stroke = look !== "pixel" && s % 2 === 0 ? color.map(v => v * 2 / 3) : color;
      ctx.save();
      ctx.shadowBlur = look === "pixel" ? 0 : 15 * scale;
      ctx.shadowColor = "rgba(0,0,0,0.20)";
      ctx.strokeStyle = css(stroke);
      ctx.globalAlpha = 0.72;
      ctx.lineWidth = (look === "pixel" ? 1.6 - pulse * 0.4 : 3.25 - pulse) * scale;
      ctx.beginPath();
      ctx.moveTo(spillInset, yc);
      ctx.bezierCurveTo(c1x, c1y, spillInset + curveWidth, yc, spillInset + curveWidth, yc);
      ctx.stroke();
      ctx.restore();
    }

    ctx.globalAlpha = 0.72;
    const radius = 7.5 * scale / 2;
    ctx.fillStyle = css(viz[0]);
    ctx.beginPath(); ctx.arc(spillInset, yc, radius, 0, 7); ctx.fill();
    ctx.fillStyle = css(viz[1]);
    ctx.beginPath(); ctx.arc(spillInset + curveWidth, yc, radius, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function spectrumBar(x, y, barWidth, barHeight, color, radius) {
    ctx.fillStyle = css(color);
    if (radius <= 0) {
      ctx.fillRect(x, y, barWidth, barHeight);
      return;
    }
    const r = Math.min(radius, barWidth / 2, barHeight / 2);
    ctx.beginPath();
    ctx.roundRect(x, y, barWidth, barHeight, [r, r, 0, 0]);
    ctx.fill();
  }

  function drawSpectrum(levels) {
    const pixel = look === "pixel" && pixels;
    const centerGap = width * 0.045;
    const sideWidth = (width - centerGap) / 2;
    const slotWidth = sideWidth / levels.length;
    const spacing = pixel ? Math.max(1, Math.round(slotWidth * 0.28))
                          : Math.max(2, slotWidth * 0.30);
    const barWidth = Math.max(1, slotWidth - spacing);
    const baseline = height * 0.88;
    const maxBarHeight = height * (variant === "loud" ? 0.80 : 0.72);
    const step = pixel ? Math.max(2, Math.round(height / 18)) : 0;

    ctx.save();
    ctx.globalAlpha = pixel ? 0.86 : 0.76;
    ctx.shadowBlur = pixel ? 0 : Math.max(5, height * 0.055);
    ctx.shadowColor = "rgba(0,0,0,0.22)";
    for (let band = 0; band < levels.length; band++) {
      const mix = band / Math.max(1, levels.length - 1);
      const color = viz[0].map((value, i) => value + (viz[1][i] - value) * mix);
      let barHeight = levels[band] * maxBarHeight;
      if (pixel) barHeight = Math.round(barHeight / step) * step;
      if (barHeight < (pixel ? step : 0.75)) continue;
      const y = baseline - barHeight;
      const rightX = width / 2 + centerGap / 2 + band * slotWidth + spacing / 2;
      const leftX = width / 2 - centerGap / 2 - (band + 1) * slotWidth + spacing / 2;
      const radius = pixel ? 0 : Math.min(3, barWidth / 2);
      spectrumBar(leftX, y, barWidth, barHeight, color, radius);
      spectrumBar(rightX, y, barWidth, barHeight, color, radius);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = pixel ? 0.32 : 0.20;
    ctx.fillStyle = css(viz[0]);
    const baselineHeight = pixel ? Math.max(1, step / 3) : 1;
    ctx.fillRect(0, baseline, width / 2 - centerGap / 2, baselineHeight);
    ctx.fillRect(width / 2 + centerGap / 2, baseline,
                 width / 2 - centerGap / 2, baselineHeight);
    ctx.restore();
  }

  function draw(t, token) {
    if (token !== chain) return;
    lastDrawAt = performance.now();
    const dt = lastFrameAt ? Math.min(0.1, (t - lastFrameAt) / 1000) : 1 / 60;
    lastFrameAt = t;
    const fresh = performance.now() - lastAudioAt < 1500;
    const energies = {
      strings: advanceModel(audioModels.strings, dt, fresh),
      spectrum: advanceModel(audioModels.spectrum, dt, fresh),
    };

    ctx.clearRect(0, 0, width, height);
    if (vizMode === "spectrum") drawSpectrum(audioModels.spectrum.displayed);
    else drawStrings(audioModels.strings.displayed);

    const activeModel = audioModels[vizMode];
    if (energies[vizMode] < 0.02 && Math.max(...activeModel.target) < 0.01) {
      quietFrames += 1;
      if (quietFrames > 90) { animating = false; quietFrames = 0; return; }
    } else {
      quietFrames = 0;
    }
    if (animating) requestAnimationFrame((t2) => draw(t2, token));
  }
  // (initial parked frame comes from resize() → wake())

  // ---------- dev harness (standalone browser only: no WE bridge) ----------
  if (!window.wallpaperRegisterAudioListener) {
    document.getElementById("devhint").style.display = "block";
    const params = new URLSearchParams(location.search);
    if (params.get("variant")) setVariant(params.get("variant"));
    setLook(params.get("look") || localStorage.getItem("repose-look") || "zephyr");
    setViz(params.get("viz") || localStorage.getItem("repose-viz") || "strings");
    setPixels(params.get("pixels") || localStorage.getItem("repose-pixels") || "on");
    if (params.get("grade")) document.body.dataset.grade =
      params.get("grade") === "off" ? "off" : "on";
    if (params.get("night")) document.body.dataset.night =
      params.get("night") === "on" ? "on" : "off";
    let synth = true;
    const AGENT_STATES = [
      { working: 2, waiting: 1, done: 1 }, { working: 1, waiting: 0, done: 0 },
      { working: 0, waiting: 0, done: 2 }, { working: 0, waiting: 0, done: 0 },
    ];
    let agentIndex = 0, mediaIndex = 0;
    agents = AGENT_STATES[0];
    renderAgents();
    const media = document.getElementById("media");
    const MEDIA_STATES = [
      ["Synthesis", "TN-SHI"],
      ["Everything In Its Right Place (Live From Osaka / 2016 Remaster)",
       "The Cinematic Orchestra of the Autumn Palace feat. Somebody Longwinded"],
      null,
    ];
    if (params.get("media") === "long") mediaIndex = 1;
    if (params.get("media") === "off") mediaIndex = 2;
    const showMedia = () => {
      const state = MEDIA_STATES[mediaIndex];
      media.style.display = state ? "block" : "none";
      if (state) setMediaText(state[0], state[1]);
    };
    showMedia();
    setInterval(() => {
      if (!synth) return;
      const frame = new Array(128).fill(0);
      const now = Date.now();
      const beat = Math.pow(Math.max(0, Math.sin(now / 245)), 3);
      for (let band = 0; band < 64; band++) {
        const texture = Math.abs(Math.sin(now / 310 + band * 0.42));
        const bass = beat * Math.exp(-band / 15);
        const value = Math.min(1, 0.04 + texture * 0.34 + bass * 0.62);
        frame[band] = value;
        frame[band + 64] = value;
      }
      ingestAudio(frame);
    }, 33);
    let typescale = Number(localStorage.getItem("repose-typescale")) || 1;
    const WALLS = ["moonlit-ocean", "blue-alps", "forest-path", "warm-dunes",
                   "cool-neon-city", "purple-brutalism"];
    let wallIndex = Number(localStorage.getItem("repose-wall") ?? -1);
    const hint = document.getElementById("devhint");
    const refreshHint = () => {
      hint.textContent = "dev · q quiet · l loud · k look (" + look + ") · " +
        `v viz (${vizMode}) · x pixels (${pixels ? "on" : "off"}) · p synth audio · a agents · ` +
        `m media · s grade · n night · w wall (${wallIndex < 0 ? "off" : WALLS[wallIndex]}) · ` +
        `[ ] type ×${typescale.toFixed(2)}`;
    };
    const applyTypescale = () => {
      document.documentElement.style.setProperty("--typescale", typescale.toFixed(2));
      localStorage.setItem("repose-typescale", typescale);
      refreshHint();
    };
    const applyWall = () => {
      document.body.dataset.wall = wallIndex < 0 ? "off" : "on";
      if (wallIndex >= 0) {
        document.getElementById("wall").style.backgroundImage =
          `url("../../livery/assets/${WALLS[wallIndex]}.jpg")`;
      }
      localStorage.setItem("repose-wall", wallIndex);
      refreshHint();
    };
    if (params.get("wall")) {
      const named = WALLS.indexOf(params.get("wall"));
      wallIndex = named >= 0 ? named
        : Math.min(WALLS.length - 1, Number(params.get("wall")) || 0);
      if (params.get("wall") === "off") wallIndex = -1;
    }
    applyTypescale();
    applyWall();
    document.addEventListener("keydown", (event) => {
      if (event.key === "q") setVariant("quiet");
      else if (event.key === "l") setVariant("loud");
      else if (event.key === "k") {
        setLook(look === "zephyr" ? "pixel" : "zephyr");
        localStorage.setItem("repose-look", look);
        refreshHint();
      }
      else if (event.key === "v") {
        setViz(vizMode === "strings" ? "spectrum" : "strings");
        localStorage.setItem("repose-viz", vizMode);
        refreshHint();
      }
      else if (event.key === "x") {
        setPixels(pixels ? "off" : "on");
        localStorage.setItem("repose-pixels", pixels ? "on" : "off");
        refreshHint();
      }
      else if (event.key === "p") {
        synth = !synth;
        if (!synth) {
          Object.values(audioModels).forEach(model => model.target.fill(0));
          wake();
        }
      }
      else if (event.key === "a") {
        agentIndex = (agentIndex + 1) % AGENT_STATES.length;
        agents = AGENT_STATES[agentIndex];
        renderAgents();
      } else if (event.key === "m") {
        mediaIndex = (mediaIndex + 1) % MEDIA_STATES.length;
        showMedia();
      }
      else if (event.key === "w") {
        wallIndex = ((wallIndex + 2) % (WALLS.length + 1)) - 1;
        applyWall();
      }
      else if (event.key === "s") {
        document.body.dataset.grade =
          document.body.dataset.grade === "on" ? "off" : "on";
      } else if (event.key === "n") {
        document.body.dataset.night =
          document.body.dataset.night === "on" ? "off" : "on";
      } else if (event.key === "[") {
        typescale = Math.max(0.5, typescale - 0.05); applyTypescale();
      } else if (event.key === "]") {
        typescale = Math.min(2, typescale + 0.05); applyTypescale();
      }
    });
  }
</script>
</body>
</html>
