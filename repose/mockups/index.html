<!DOCTYPE html>
<html lang="en" data-layout="corner" data-voice="serif" data-grammar="sentence" data-scrim="soft">
<head>
<meta charset="utf-8">
<title>repose · composition mockups</title>
<style>
  /* Palette: Livery current manifest (locked signals + presentation). */
  :root {
    --text: #f5e0dc;
    --muted: #c4babc;        /* barLegibility-adjusted muted, made for wallpaper */
    --faint: #7f8490;
    --peach: #fab387;        /* signals.attention — agent waiting */
    --green: #9ed072;        /* signals.success — agent done */
    --string-a: #87d6bc;     /* presentation.visualizerGradient */
    --string-b: #a8cbe2;
    --scale: 1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #101018; color: var(--text); cursor: none; }
  #wall {
    position: fixed; inset: 0; z-index: -1;
    background: center / cover no-repeat;
  }
  /* StandBy-style night tint: one hue over the whole composition */
  html[data-night="on"] body {
    filter: sepia(1) hue-rotate(-40deg) saturate(2.2) brightness(.6) contrast(1.05);
  }

  /* ---- scrim (cycled with s): legibility stand-in for the Look-time treatment */
  .scrim { position: fixed; inset: 0; pointer-events: none; transition: opacity .4s; }
  html[data-scrim="off"]  .scrim { opacity: 0; }
  html[data-scrim="soft"] .scrim {
    opacity: 1;
    background: linear-gradient(to top, rgba(0,0,0,.42), rgba(0,0,0,.06) 45%, rgba(0,0,0,0) 70%);
  }
  html[data-scrim="strong"] .scrim { opacity: 1; background: rgba(0,0,0,.45); }
  /* "grade, don't blur" (hyprlock recipe): crush contrast, darken, desaturate
     the wallpaper itself; vignette pushes luminance toward the composition */
  html[data-scrim="grade"] #wall {
    filter: contrast(.89) brightness(.82) saturate(.75);
  }
  html[data-scrim="grade"] .scrim {
    opacity: 1;
    background: radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.45) 100%);
  }

  /* dark polarity: stand-in for the Look-time legibility analyzer's flip on
     light wallpapers (colors approximate; production derives them per Look) */
  html[data-polarity="dark"] {
    --text: #1e1e2e; --muted: #3d4152; --faint: #585b70;
    --peach: #b45309; --green: #3f6212;
  }
  html[data-polarity="dark"] .scene { text-shadow: 0 1px 22px rgba(255,255,255,.5), 0 0 2px rgba(255,255,255,.3); }
  html[data-polarity="dark"][data-scrim="soft"] .scrim {
    background: linear-gradient(to top, rgba(255,255,255,.38), rgba(255,255,255,.05) 45%, rgba(255,255,255,0) 70%);
  }
  html[data-polarity="dark"][data-scrim="strong"] .scrim { background: rgba(255,255,255,.42); }

  /* ---- composed chrome: Livery-language cohesion — a shared axis, a
     hairline rule, and a modular scale. No containers; the wallpaper is
     the surface and legibility belongs to the Look-time treatment. */
  .rule, .media .progress { display: none; }
  html[data-chrome="composed"] .rule {
    display: block; height: 1px; margin-top: 1.8vh;
    background: rgba(245,224,220,.28);
  }
  html[data-chrome="composed"][data-polarity="dark"] .rule { background: rgba(30,30,46,.30); }
  html[data-chrome="composed"] .date { letter-spacing: .06em; }
  /* composed = one axis: media and agents sit exactly on the clock's margin */
  html[data-chrome="composed"][data-layout="corner"] .media,
  html[data-chrome="composed"][data-layout="corner"] .agents { left: 6vw; }
  html[data-chrome="composed"] .media .progress {
    display: block; height: 1px; margin-top: .55em; opacity: .7;
    background: rgba(255,255,255,.16);
  }
  html[data-chrome="composed"] .media .progress i {
    display: block; height: 100%; width: 42%;
    background: linear-gradient(90deg, var(--string-a), var(--string-b));
  }

  /* ---- zephyr chrome: faithful port of Zephyr's language (matugen default
     palette, Cantarell bold, plaque odometer clock with seconds, primary→
     tertiary viz). The digit "knockout" (destination-out in QML) is
     approximated with a dark digit color. */
  html[data-chrome="zephyr"] {
    --text: #f0dfd7; --muted: #d7c2b9; --faint: #9f8d84;
    --peach: #ffb68e; --green: #cec991;
    --string-a: #ffb68e; --string-b: #cec991;
  }
  /* !important: the voice rules come later in the sheet and would win.
     Within the zephyr language the voice key still cycles typography:
     serif slot = Cantarell (native), sans = system, mono = SF Mono. */
  html[data-chrome="zephyr"] .scene {
    font-family: "Cantarell", "Avenir Next", system-ui, sans-serif !important;
    font-weight: 700; text-shadow: none;
  }
  html[data-chrome="zephyr"][data-voice="sans"] .scene {
    font-family: system-ui, sans-serif !important;
  }
  html[data-chrome="zephyr"][data-voice="mono"] .scene {
    font-family: ui-monospace, "SF Mono", Menlo, monospace !important;
  }
  /* the plaque clock is wider (seconds); keep the strings clear of it */
  html[data-chrome="zephyr"][data-layout="corner"] .strings { left: 54vw; }
  html[data-chrome="zephyr"] .clock { font-size: 7.5vw !important; }
  html[data-chrome="zephyr"] .date {
    font-style: normal !important; font-size: 1.2vw !important;
    letter-spacing: .04em !important; text-transform: none !important;
    margin-bottom: 1vh;
  }
  .zclock { display: flex; align-items: flex-start; gap: .07em; }
  /* fixed-width slots (no jiggle as digits change); passing digits dim and
     the settled one lights — the qylock read-line emphasis */
  .zcol { overflow: hidden; height: 1.16em; width: .82em; border-radius: .04em; }
  .zcol .stack {
    display: flex; flex-direction: column;
    transition: transform .5s cubic-bezier(0.23, 1, 0.32, 1);  /* OutQuint */
  }
  .zcol .cell {
    height: 1.16em; padding: 0 .12em; color: #1f140e; line-height: 1.16;
    display: flex; align-items: center; justify-content: center;
    opacity: .55; transition: opacity .3s;
  }
  .zcol .cell.on { opacity: 1; }
  .zcol .cell.zero { background: transparent; }
  .zsep { width: .09em; height: 1.16em; margin: 0 .05em; border-radius: .03em; }
  .zsep.s1 { background: rgba(65,55,50,.8); }   /* surface_bright @ .8 */
  .zsep.s2 { background: rgba(26,18,13,.8); }   /* surface @ .8 */

  /* the dial is a tall square; give it its own anchor per layout */
  html[data-viz="dial"][data-layout="corner"] .strings  { left: 46vw; bottom: 5vh; }
  html[data-viz="dial"][data-layout="lower"] .strings   { left: 33vw; bottom: 2.5vh; }
  html[data-viz="dial"][data-layout="topright"] .strings{ left: 8vw; bottom: 6vh; }

  /* ---- scene skeleton: absolute per-layout placement */
  .scene {
    position: fixed; inset: 0;
    transform: scale(var(--scale));
    text-shadow: 0 1px 24px rgba(0,0,0,.55), 0 0 2px rgba(0,0,0,.35);
  }
  .clockblock, .strings, .media, .agents { position: absolute; }

  .date { color: var(--muted); }
  .clock { line-height: .92; letter-spacing: -0.015em; }
  .media { color: var(--muted); }
  .media .note { opacity: .7; margin-right: .45em; }
  .media .artist { color: var(--faint); }
  .agents .working { color: var(--muted); }
  .agents .waiting { color: var(--peach); }
  .agents .done    { color: var(--green); }
  .agents .sep     { color: var(--faint); margin: 0 .4em; }
  .agents .dot {
    display: inline-block; width: .55em; height: .55em; border-radius: 50%;
    margin-right: .5em; background: currentColor; box-shadow: 0 0 10px currentColor;
  }

  .strings svg { display: block; overflow: visible;
    filter: drop-shadow(0 0 15px rgba(0,0,0,.20)); }

  /* ---- type voices ---- */
  html[data-voice="serif"] .scene { font-family: "New York", ui-serif, Georgia, serif; }
  html[data-voice="serif"] .clock { font-weight: 500; }
  html[data-voice="serif"] .date  { font-style: italic; font-size: 1.55vw; letter-spacing: .01em; }
  html[data-voice="serif"] .media, html[data-voice="serif"] .agents { font-size: 1.35vw; }

  html[data-voice="sans"] .scene { font-family: system-ui, "SF Pro Display", sans-serif; }
  html[data-voice="sans"] .clock { font-weight: 200; letter-spacing: -0.03em; }
  html[data-voice="sans"] .date  { font-size: 1.15vw; text-transform: uppercase; letter-spacing: .34em; }
  html[data-voice="sans"] .media, html[data-voice="sans"] .agents { font-size: 1.25vw; font-weight: 300; }

  html[data-voice="mono"] .scene { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  html[data-voice="mono"] .clock { font-weight: 300; letter-spacing: -0.06em; }
  html[data-voice="mono"] .date  { font-size: 1.2vw; letter-spacing: .02em; }
  html[data-voice="mono"] .media, html[data-voice="mono"] .agents { font-size: 1.15vw; }

  /* ---- layout 1: corner editorial (strings run out of the clock's baseline) */
  html[data-layout="corner"] .clockblock { left: 6vw; bottom: 12vh; }
  html[data-layout="corner"] .clock { font-size: 13.5vw; }
  html[data-layout="corner"] .date  { margin-bottom: 1.2vh; margin-left: .4vw; }
  html[data-layout="corner"] .strings { left: 34vw; bottom: 13.2vh; }
  html[data-layout="corner"] .media  { left: 6.4vw; bottom: 7.2vh; }
  html[data-layout="corner"] .agents { left: 6.4vw; bottom: 3.6vh; }

  /* ---- layout 2: centered monolith — one vertical axis (the layout every
     curated lock-screen pack converges on); viz as full-bleed foot terrain */
  html[data-layout="center"] .clockblock { left: 50%; top: 20vh; transform: translateX(-50%); text-align: center; }
  html[data-layout="center"] .clock { font-size: 15vw; }
  html[data-layout="center"] .date  { margin-bottom: 1vh; }
  html[data-layout="center"] .strings { left: 3vw; bottom: 6vh; }
  html[data-layout="center"] .agents { left: 50%; bottom: 24vh; transform: translateX(-50%); text-align: center; }
  html[data-layout="center"] .media  { left: 50%; bottom: 3.5vh; transform: translateX(-50%); text-align: center; }
  html[data-viz="dial"][data-layout="center"] .strings {
    left: 50%; transform: translateX(-50%); bottom: 5vh;
  }

  /* ---- layout 3: cinematic lower third */
  html[data-layout="lower"] .clockblock { left: 5vw; bottom: 7vh; }
  html[data-layout="lower"] .clock { font-size: 8.5vw; }
  html[data-layout="lower"] .date  { margin-bottom: .8vh; }
  html[data-layout="lower"] .strings { left: 30vw; bottom: 8.6vh; }
  html[data-layout="lower"] .media  { right: 5vw; bottom: 12.4vh; text-align: right; }
  html[data-layout="lower"] .agents { right: 5vw; bottom: 8.2vh; text-align: right; }

  /* ---- layout 5: headline — clock as masthead, viz full-bleed at the foot */
  html[data-layout="headline"] .clockblock { left: 6vw; top: 9vh; }
  html[data-layout="headline"] .clock { font-size: 11vw; }
  html[data-layout="headline"] .date  { margin-bottom: 1vh; }
  html[data-layout="headline"] .agents { right: 6vw; top: 11vh; text-align: right; }
  html[data-layout="headline"] .media  { left: 6vw; bottom: 24vh; }
  html[data-layout="headline"] .strings { left: 5vw; bottom: 5vh; }
  html[data-viz="dial"][data-layout="headline"] .strings { left: 40vw; bottom: 4vh; }

  /* ---- extras (e): temporal runway + power — Tier A transfers from the
     component bank; exception-first, one quiet line under the clock */
  .runway { display: none; color: var(--muted); margin-top: 1.4vh; }
  html[data-extras="on"] .runway { display: block; }
  .runway .t { color: var(--text); }
  .runway .power { margin-left: 1.2em; }
  html[data-chrome="zephyr"] .runway .power {
    background: #5f4334; color: #ffdbca;
    padding: .12em .45em; border-radius: .14em;
  }

  /* ---- layout 4: top-right (time where the bar clock trained your eyes) */
  html[data-layout="topright"] .clockblock { right: 5vw; top: 7vh; text-align: right; }
  html[data-layout="topright"] .clock { font-size: 9vw; }
  html[data-layout="topright"] .date  { margin-bottom: .8vh; }
  html[data-layout="topright"] .agents { right: 5.4vw; top: 26vh; text-align: right; }
  html[data-layout="topright"] .strings { left: 6vw; bottom: 9vh; }
  html[data-layout="topright"] .media  { left: 6.4vw; bottom: 4.5vh; }

  /* ---- harness chrome ---- */
  .hud {
    position: fixed; left: 1.2vw; top: 1.6vh; z-index: 5;
    font: 12px ui-monospace, Menlo, monospace; color: var(--faint);
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .hud.show { opacity: .9; }
  .help {
    position: fixed; right: 1.2vw; top: 1.6vh; z-index: 5;
    font: 12.5px/1.75 ui-monospace, Menlo, monospace; color: var(--muted);
    background: rgba(10,10,16,.82); border: 1px solid rgba(255,255,255,.14);
    border-radius: 8px; padding: 14px 18px; backdrop-filter: blur(10px);
  }
  .help.hidden { display: none; }
  .help b { color: var(--text); font-weight: 600; display: inline-block; min-width: 3.5em; }
</style>
</head>
<body>
  <div id="wall"></div>
  <div class="scrim"></div>

  <main class="scene">
    <div class="clockblock">
      <div class="date"></div>
      <div class="clock"></div>
      <div class="rule"></div>
      <div class="runway"></div>
    </div>
    <div class="strings"></div>
    <div class="media"></div>
    <div class="agents"></div>
  </main>

  <div class="hud"></div>
  <div class="help">
    <div><b>←/→</b> wallpaper</div>
    <div><b>1–5</b> layout: corner · center · lower · top-right · headline</div>
    <div><b>e</b> extras: next boundary + power</div>
    <div><b>f</b> type voice &nbsp;<b>g</b> agent grammar</div>
    <div><b>v</b> visualizer &nbsp;<b>c</b> language: floating · composed · zephyr</div>
    <div><b>a</b> agent state &nbsp;<b>p</b> playing</div>
    <div><b>s</b> scrim (incl. grade) &nbsp;<b>d</b> dark polarity &nbsp;<b>n</b> night tint</div>
    <div><b>[ ]</b> scale &nbsp;<b>h</b> this help</div>
  </div>

<script>
  const WALLS = ["moonlit-ocean","blue-alps","forest-path","warm-dunes","cool-neon-city","purple-brutalism"];
  const LAYOUTS = ["corner","center","lower","topright","headline"];
  const VOICES = ["serif","sans","mono"];
  const GRAMMARS = ["sentence","glyphs","dots"];
  const SCRIMS = ["soft","off","strong","grade"];
  const VIZ = ["strings","dial","bars"];
  const CHROMES = ["floating","composed","zephyr"];
  const AGENT_STATES = [
    {name:"mixed",   working:2, waiting:1, done:1},
    {name:"working", working:2, waiting:0, done:0},
    {name:"waiting", working:1, waiting:1, done:0},
    {name:"done",    working:0, waiting:0, done:2},
    {name:"none",    working:0, waiting:0, done:0},
  ];

  const state = Object.assign({
    wall:0, layout:0, voice:0, grammar:0, scrim:0, agents:0, playing:true, scale:1,
    viz:0, chrome:0, extras:false,
  }, JSON.parse(localStorage.getItem("repose-mock") || "{}"));

  // URL overrides for direct linking/screenshotting, e.g. ?layout=lower&voice=mono&wall=2
  const params = new URLSearchParams(location.search);
  const indexOf = (list, value) => Math.max(0, list.indexOf(value));
  if (params.has("wall"))    state.wall = /^\d+$/.test(params.get("wall")) ? Number(params.get("wall")) % WALLS.length : indexOf(WALLS, params.get("wall"));
  if (params.has("layout"))  state.layout = indexOf(LAYOUTS, params.get("layout"));
  if (params.has("voice"))   state.voice = indexOf(VOICES, params.get("voice"));
  if (params.has("grammar")) state.grammar = indexOf(GRAMMARS, params.get("grammar"));
  if (params.has("scrim"))   state.scrim = indexOf(SCRIMS, params.get("scrim"));
  if (params.has("agents"))  state.agents = Math.max(0, AGENT_STATES.findIndex(s => s.name === params.get("agents")));
  if (params.has("silent"))  state.playing = false;
  if (params.has("polarity")) state.dark = params.get("polarity") === "dark";
  if (params.has("viz"))    state.viz = indexOf(VIZ, params.get("viz"));
  if (params.has("chrome")) state.chrome = indexOf(CHROMES, params.get("chrome"));
  if (params.has("extras")) state.extras = params.get("extras") !== "off";
  if (params.has("night"))  state.night = params.get("night") !== "off";
  if ([...params.keys()].length) {
    document.addEventListener("DOMContentLoaded", () =>
      document.querySelector(".help").classList.add("hidden"));
  }

  WALLS.forEach(w => { new Image().src = `../../theming/assets/${w}.jpg`; });

  // ---- strings: static approximation of the accepted Zephyr baseline.
  // Shared endpoints, ten strands fanned by cubic bulges; energy only sets
  // amplitude — motion itself is frozen in the Swift preview and not judged here.
  function seeded(i) { let s = i * 2654435761 % 4294967296;
    return () => (s = (s * 1103515245 + 12345) % 2147483648) / 2147483648; }
  function stringsSVG(width, height, energy) {
    const yc = height / 2, x0 = 8, x1 = width - 8;
    let paths = "";
    const span = x1 - x0;
    for (let i = 0; i < 10; i++) {
      const rand = seeded(i * 13 + 5);
      const dir = i % 2 ? 1 : -1;
      const amp = (0.35 + rand() * 0.65) * (height / 2 - 4) * energy
                  + dir * 2 * (1 - energy);
      const sCurve = rand() > 0.45;
      const c1x = x0 + span * (0.15 + rand() * 0.30);
      const c2x = x0 + span * (0.55 + rand() * 0.30);
      const c1y = yc + dir * amp * (0.8 + rand() * 0.7);
      const c2y = sCurve ? yc - dir * amp * (0.7 + rand() * 0.8)
                         : yc + dir * amp * (0.5 + rand() * 0.7);
      const w = (2.25 + rand() * 1.0).toFixed(2);
      paths += `<path d="M ${x0} ${yc} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x1} ${yc}"
        fill="none" stroke="url(#sg)" stroke-width="${w}" stroke-linecap="round" opacity="0.72"/>`;
    }
    const [ca, cb] = vizColors();
    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="${ca}"/><stop offset="1" stop-color="${cb}"/>
      </linearGradient></defs>
      ${paths}
      <circle cx="${x0}" cy="${yc}" r="3.75" fill="${ca}"/>
      <circle cx="${x1}" cy="${yc}" r="3.75" fill="${cb}"/>
    </svg>`;
  }

  /* widths as viewport fractions; heights hold the baseline's ~4:1 ratio */
  const STRING_GEOMETRY = {
    corner:   {w: 0.50, h: 210}, center: {w: 0.94, h: 170},
    lower:    {w: 0.30, h: 130}, topright:{w: 0.52, h: 220},
    headline: {w: 0.90, h: 200},
  };

  /* viz colors follow the language: Livery's presentation gradient, or
     Zephyr's primary → tertiary */
  const vizColors = () => CHROMES[state.chrome] === "zephyr"
    ? ["#ffb68e", "#cec991"] : ["#87d6bc", "#a8cbe2"];
  const hexToRgb = (h) => [1,3,5].map(i => parseInt(h.slice(i, i + 2), 16));
  const mixColor = (t) => {   /* gradient interpolation for spoke/bar strokes */
    const [a, b] = vizColors().map(hexToRgb);
    return "#" + a.map((v,i) => Math.round(v + (b[i]-v)*t).toString(16).padStart(2,"0")).join("");
  };

  function dialSVG(size, energy) {   /* radial NCS-style spectrum */
    const c = size / 2, r0 = size * 0.30, rMax = size / 2 - 5;
    let spokes = "";
    for (let i = 0; i < 56; i++) {
      const rand = seeded(i * 7 + 3);
      const angle = (i / 56) * Math.PI * 2 - Math.PI / 2;
      const len = (0.10 + rand() * 0.90) * (rMax - r0 - 4) * energy + 3 * (1 - energy);
      const x1 = c + Math.cos(angle) * r0,        y1 = c + Math.sin(angle) * r0;
      const x2 = c + Math.cos(angle) * (r0 + len), y2 = c + Math.sin(angle) * (r0 + len);
      spokes += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
        stroke="${mixColor((1 - Math.cos(angle)) / 2)}" stroke-width="2.6"
        stroke-linecap="round" opacity="0.72"/>`;
    }
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r0 - 8}" fill="none"
        stroke="rgba(255,255,255,.20)" stroke-width="1"/>${spokes}</svg>`;
  }

  function barsSVG(width, height, energy) {   /* mirrored Monstercat bars */
    const n = 44, yc = height / 2, slot = width / n, barW = slot * 0.55;
    let bars = "";
    for (let i = 0; i < n; i++) {
      const rand = seeded(i * 11 + 9);
      const arch = Math.sin((i / (n - 1)) * Math.PI) * 0.6 + 0.4;
      const h = Math.max(2, (0.08 + rand() * 0.92) * arch * yc * energy + 2 * (1 - energy));
      const x = i * slot + slot / 2;
      bars += `<line x1="${x}" y1="${yc - h}" x2="${x}" y2="${yc + h}"
        stroke="${mixColor(i / (n - 1))}" stroke-width="${barW}"
        stroke-linecap="round" opacity="0.72"/>`;
    }
    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${bars}</svg>`;
  }

  function renderViz() {
    const geo = STRING_GEOMETRY[LAYOUTS[state.layout]];
    const width = Math.round(window.innerWidth * geo.w);
    const energy = state.playing ? 1 : 0.06;
    const shape = VIZ[state.viz];
    const el = document.querySelector(".strings");
    if (shape === "dial") el.innerHTML = dialSVG(Math.round(geo.h * 1.9), energy);
    else if (shape === "bars") el.innerHTML = barsSVG(width, geo.h, energy);
    else el.innerHTML = stringsSVG(width, geo.h, energy);
  }

  /* Zephyr's plaque clock: hours in primary, minutes ÷1.5, seconds ÷2;
     stacked cells lighten by 1 + i/10; zero renders chipless in the plaque
     color; columns roll 500ms OutQuint. */
  const Z_BASES = ["#ffb68e", "#aa795e", "#7f5b47"];
  const zScale = (hex, f) => "#" + hexToRgb(hex)
    .map(v => Math.min(255, Math.round(v * f)).toString(16).padStart(2,"0")).join("");

  function buildZephyrClock(el) {
    const col = (base) => `<span class="zcol"><span class="stack">${
      Array.from({length: 10}, (_, i) => i === 0
        ? `<span class="cell zero" style="color:${base}">0</span>`
        : `<span class="cell" style="background:${zScale(base, 1 + i/10)}">${i}</span>`
      ).join("")}</span></span>`;
    el.innerHTML = `<span class="zclock">
      ${col(Z_BASES[0])}${col(Z_BASES[0])}<span class="zsep s1"></span>
      ${col(Z_BASES[1])}${col(Z_BASES[1])}<span class="zsep s2"></span>
      ${col(Z_BASES[2])}${col(Z_BASES[2])}</span>`;
  }

  function renderClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const clockEl = document.querySelector(".clock");
    if (CHROMES[state.chrome] === "zephyr") {
      if (!clockEl.querySelector(".zclock")) buildZephyrClock(clockEl);
      let h12 = now.getHours() % 12; if (h12 === 0) h12 = 12;
      const digits = [Math.floor(h12/10), h12%10,
                      Math.floor(now.getMinutes()/10), now.getMinutes()%10,
                      Math.floor(now.getSeconds()/10), now.getSeconds()%10];
      clockEl.querySelectorAll(".zcol .stack").forEach((stack, i) => {
        stack.style.transform = `translateY(${(-digits[i] * 1.16).toFixed(2)}em)`;
        stack.querySelectorAll(".cell").forEach((cell, d) =>
          cell.classList.toggle("on", d === digits[i]));
      });
    } else {
      clockEl.textContent = `${hh}:${mm}`;
    }
    const voice = VOICES[state.voice];
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July",
                    "August","September","October","November","December"];
    let date;
    if (voice === "serif") date = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
    else if (voice === "sans") date = `${days[now.getDay()].slice(0,3)} ${now.getDate()} ${months[now.getMonth()].slice(0,3)}`;
    else date = `${days[now.getDay()].slice(0,3)} ${now.toISOString().slice(0,10)}`;  /* the bar's %a %F */
    document.querySelector(".date").textContent = date;
  }

  function renderExtras() {
    const el = document.querySelector(".runway");
    if (!state.extras) { el.innerHTML = ""; return; }
    /* mock next boundary two hours out, real countdown to it */
    const now = new Date();
    const eventHour = (now.getHours() + 2) % 24;
    const minutesLeft = 120 - now.getMinutes();
    const countdown = `${Math.floor(minutesLeft / 60)}h ${String(minutesLeft % 60).padStart(2,"0")}m`;
    el.innerHTML = `→ <span class="t">${String(eventHour).padStart(2,"0")}:00</span> standup · ${countdown}
      <span class="power">⌁ 73%</span>`;
  }

  function renderMedia() {
    const el = document.querySelector(".media");
    if (!state.playing) { el.innerHTML = ""; el.style.display = "none"; return; }
    el.style.display = "";
    el.innerHTML = `<span class="note">♪</span>Synthesis <span class="artist">— TN-SHI</span>
      <span class="progress"><i></i></span>`;
  }

  function renderAgents() {
    const a = AGENT_STATES[state.agents];
    const el = document.querySelector(".agents");
    const parts = [];
    if (AGENT_STATES[state.agents].name === "none") { el.innerHTML = ""; el.style.display = "none"; return; }
    el.style.display = "";
    const grammar = GRAMMARS[state.grammar];
    if (grammar === "sentence") {
      if (a.working) parts.push(`<span class="working">${a.working} working</span>`);
      if (a.waiting) parts.push(`<span class="waiting">${a.waiting} waiting for you</span>`);
      if (a.done)    parts.push(`<span class="done">${a.done} done</span>`);
      el.innerHTML = parts.join(`<span class="sep">·</span>`);
    } else if (grammar === "glyphs") {
      if (a.working) parts.push(`<span class="working">✶ ${a.working}</span>`);
      if (a.waiting) parts.push(`<span class="waiting">✳ ${a.waiting}</span>`);
      if (a.done)    parts.push(`<span class="done">● ${a.done}</span>`);
      el.innerHTML = parts.join(`<span class="sep">·</span>`);
    } else {
      const dots = [];
      for (let i=0;i<a.working;i++) dots.push(`<span class="dot working"></span>`);
      for (let i=0;i<a.waiting;i++) dots.push(`<span class="dot waiting"></span>`);
      for (let i=0;i<a.done;i++)    dots.push(`<span class="dot done"></span>`);
      el.innerHTML = dots.join("");
    }
  }

  let hudTimer;
  function renderAll(showHud) {
    const html = document.documentElement;
    html.dataset.layout = LAYOUTS[state.layout];
    html.dataset.voice = VOICES[state.voice];
    html.dataset.grammar = GRAMMARS[state.grammar];
    html.dataset.scrim = SCRIMS[state.scrim];
    html.dataset.polarity = state.dark ? "dark" : "light";
    html.dataset.chrome = CHROMES[state.chrome];
    html.dataset.viz = VIZ[state.viz];
    html.dataset.extras = state.extras ? "on" : "off";
    html.dataset.night = state.night ? "on" : "off";
    document.querySelector("#wall").style.backgroundImage =
      `url("../../theming/assets/${WALLS[state.wall]}.jpg")`;
    document.documentElement.style.setProperty("--scale", state.scale);
    renderClock(); renderViz(); renderMedia(); renderAgents(); renderExtras();
    localStorage.setItem("repose-mock", JSON.stringify(state));
    if (showHud) {
      const hud = document.querySelector(".hud");
      hud.textContent = [WALLS[state.wall], LAYOUTS[state.layout], VOICES[state.voice],
        VIZ[state.viz], CHROMES[state.chrome],
        GRAMMARS[state.grammar], `scrim:${SCRIMS[state.scrim]}`,
        state.playing ? "playing" : "silent", AGENT_STATES[state.agents].name,
        state.extras ? "extras" : null, state.night ? "night" : null,
        `×${state.scale.toFixed(2)}`]
        .filter(Boolean).join(" · ");
      hud.classList.add("show");
      clearTimeout(hudTimer);
      hudTimer = setTimeout(() => hud.classList.remove("show"), 2200);
    }
  }

  const cycle = (key, list) => { state[key] = (state[key] + 1) % list.length; };
  document.addEventListener("keydown", (event) => {
    const k = event.key;
    if (k === "ArrowRight") cycle("wall", WALLS);
    else if (k === "ArrowLeft") state.wall = (state.wall + WALLS.length - 1) % WALLS.length;
    else if (k >= "1" && k <= "5") state.layout = Number(k) - 1;
    else if (k === "e") state.extras = !state.extras;
    else if (k === "n") state.night = !state.night;
    else if (k === "f") cycle("voice", VOICES);
    else if (k === "g") cycle("grammar", GRAMMARS);
    else if (k === "a") cycle("agents", AGENT_STATES);
    else if (k === "p") state.playing = !state.playing;
    else if (k === "s") cycle("scrim", SCRIMS);
    else if (k === "v") cycle("viz", VIZ);
    else if (k === "c") cycle("chrome", CHROMES);
    else if (k === "d") state.dark = !state.dark;
    else if (k === "[") state.scale = Math.max(0.7, state.scale - 0.05);
    else if (k === "]") state.scale = Math.min(1.4, state.scale + 0.05);
    else if (k === "h") { document.querySelector(".help").classList.toggle("hidden"); return; }
    else return;
    document.querySelector(".help").classList.add("hidden");
    renderAll(true);
  });

  window.addEventListener("resize", renderViz);
  setInterval(renderClock, 1000);
  renderAll(false);
</script>
</body>
</html>
